# nginx reverse-proxy configuration for the SAS frontend container.
#
# Static React assets are served directly; all /api/* requests are
# forwarded to the backend (service name "api" in docker-compose).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ──────────────────────────────────────────────────────────
    # 127.0.0.11 is Docker's internal DNS resolver; required for service-name resolution.
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://api:12000;

    location /api/ {
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Support streaming responses (job logs, SSE)
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }

    # ── Static assets ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
