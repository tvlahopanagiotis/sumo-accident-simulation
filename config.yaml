sumo:
  config_file: /Users/theocharisvlachopanagiotis/Downloads/files/thessaloniki_network/thessaloniki.sumocfg
  binary: sumo
  total_steps: 7200
  seed: 42
  step_length: 5
risk:
  # Thessaloniki calibration: ~500 simultaneous vehicles at steady state.
  # Target ~5 accidents per 2-hour run → 5.0e-05
  # (Sioux Falls used 1.5e-04 for ~150 vehicles; Thessaloniki is ~3× denser
  #  so the per-vehicle probability scales down by ~3× to keep the same rate)
  base_probability: 5.0e-05
  speed_weight: 0.4
  speed_exponent: 2.0
  speed_variance_weight: 0.3
  speed_variance_threshold_ms: 5.0
  density_weight: 0.3
  peak_density_vehicles_per_km: 15
  road_type_multipliers:
    highway: 1.5
    arterial: 1.0
    local: 0.6
    intersection: 2.0
  trigger_threshold: 0.35
  neighbor_radius_m: 150
accident:
  max_concurrent_accidents: 2
  secondary_accident_enabled: true
  severity:
    minor:
      weight: 62
      duration_min_s: 120
      duration_max_s: 900
      lane_capacity_fraction: 0.7
      response_time_s: 300
      secondary_risk_radius_m: 75
      secondary_risk_multiplier: 1.5
    moderate:
      weight: 28
      duration_min_s: 900
      duration_max_s: 2700
      lane_capacity_fraction: 0.4
      response_time_s: 600
      secondary_risk_radius_m: 150
      secondary_risk_multiplier: 2.5
    major:
      weight: 8
      duration_min_s: 2700
      duration_max_s: 7200
      lane_capacity_fraction: 0.1
      response_time_s: 1200
      secondary_risk_radius_m: 300
      secondary_risk_multiplier: 4.0
    critical:
      weight: 2
      duration_min_s: 3600
      duration_max_s: 18000
      lane_capacity_fraction: 0.0
      response_time_s: 1800
      secondary_risk_radius_m: 500
      secondary_risk_multiplier: 6.0
output:
  output_folder: results/
  metrics_interval_steps: 60
  save_vehicle_snapshots: true
  save_accident_reports: true
  compute_antifragility_index: true
  save_accident_heatmap: true
  pre_window_seconds: 300
  post_window_seconds: 300
  baseline_window_steps: 1800
