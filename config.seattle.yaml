# =============================================================================
# AntifragiCity / SAS — Simulation Configuration
# =============================================================================
# Edit this file to control the simulation without touching any Python code.
# All physical quantities use SI units (metres, seconds, m/s) unless stated.
# =============================================================================

sumo:
  # Path to the .sumocfg file that references the road network and route files.
  # Use generate_thessaloniki.py (or the other generators) to produce this.
  config_file: /Users/theocharisvlachopanagiotis/Downloads/files/seattle_network/seattle.sumocfg

  # SUMO executable: "sumo" (headless, for batch runs) or "sumo-gui" (graphical).
  binary: sumo

  # Total simulation duration in steps.  With step_length=5 s, 7200 steps = 2 h.
  total_steps: 7200

  # Random seed passed to both SUMO and Python's RNG — set to a fixed integer
  # for reproducible results, or change between runs to explore variance.
  seed: 1

  # Duration of each simulation step in seconds.
  # 5 s is a good balance: fine enough for congestion dynamics, fast enough
  # for a 2-hour run to complete in ~5–10 minutes of wall-clock time.
  step_length: 5

# -----------------------------------------------------------------------------
risk:
# -----------------------------------------------------------------------------
# Controls how the per-vehicle risk score is computed each step.
# Score = base_probability × speed_term × variance_term × density_term × road_type
# An accident is triggered when score > trigger_threshold (sampled stochastically).
# -----------------------------------------------------------------------------

  # Baseline accident probability per vehicle per step before any multipliers.
  # Calibrate to your network's steady-state vehicle count:
  #   ~80  vehicles  (Riverside)    → 2.0e-04
  #   ~150 vehicles  (Sioux Falls)  → 1.5e-04
  #   ~500 vehicles  (small city)   → 5.0e-05
  #   ~1100 vehicles (Thessaloniki) → 1.5e-05
  #   ~2000 vehicles (large city)   → 8.0e-06
  #
  # Thessaloniki calibration: ~1100–1200 simultaneous vehicles at steady state.
  # Target: 3–5 accidents per 2-hour run.
  # (Full run at 5.0e-05 produced 11 accidents with ~1150 vehicles; reduced ~3×.)
  base_probability: 8.0e-06

  # Weight of the speed component in the composite risk score (0–1).
  # Higher values make fast-moving vehicles disproportionately risky.
  speed_weight: 0.4

  # Exponent applied to the normalised speed term.
  # 2.0 = quadratic relationship (doubling speed → 4× contribution), matching
  # empirical crash-energy findings (kinetic energy ∝ v²).
  speed_exponent: 2.0

  # Weight of the speed-variance (heterogeneity) component (0–1).
  # High variance means some vehicles are much faster than others on the same
  # road segment — a known risk factor for rear-end and lane-change crashes.
  speed_variance_weight: 0.3

  # Speed standard deviation (m/s) above which variance risk saturates at 1.0.
  # 5.0 m/s ≈ 18 km/h — typical threshold for dangerous speed heterogeneity.
  speed_variance_threshold_ms: 5.0

  # Weight of the local vehicle density component (0–1).
  density_weight: 0.3

  # Vehicle density (vehicles/km of lane) at which density risk saturates at 1.0.
  # 15 veh/km corresponds to slow-moving but not gridlocked urban traffic.
  peak_density_vehicles_per_km: 15

  # Multiplicative factors applied to the base risk score based on road type.
  # Values > 1 increase risk; values < 1 decrease it.
  road_type_multipliers:
    highway: 1.5        # high speeds, limited access — elevated severity when crashes occur
    arterial: 1.0       # reference (no adjustment)
    local: 0.6          # low speeds, short trips — inherently lower risk
    intersection: 2.0   # conflict point — highest multiplier

  # Risk score threshold above which an accident is triggered.
  # Lower values → more frequent accidents.  0.35 gives realistic rates when
  # base_probability is calibrated correctly for the vehicle count.
  trigger_threshold: 0.35

  # Radius (metres) used to find neighbouring vehicles when computing local
  # density and speed variance around a candidate accident vehicle.
  neighbor_radius_m: 150

# -----------------------------------------------------------------------------
accident:
# -----------------------------------------------------------------------------
# Controls accident lifecycle: severity sampling, concurrent caps, and the
# secondary-accident cascade that models rubbernecking / chain reactions.
# -----------------------------------------------------------------------------

  # Maximum number of active (unresolved) accidents at any one time.
  # Raised from 2 → 4: at 1100+ simultaneous vehicles the cap of 2 was hit
  # 84% of the time, suppressing accident triggering and reducing measurable
  # AI events to n=2 (statistically insufficient for antifragility analysis).
  max_concurrent_accidents: 4

  # Allow a resolved accident to trigger a secondary accident nearby.
  # Models rubbernecking, debris, emergency-vehicle conflicts, etc.
  secondary_accident_enabled: true

  # Severity tiers — sampled by weight (must not sum to exactly 100; weights
  # are relative).  Each tier defines the physical and operational parameters
  # of the accident: how long it lasts, how much it reduces lane capacity, and
  # how aggressively it elevates risk for nearby vehicles.
  severity:

    minor:
      weight: 62                    # ~62 % of all accidents
      duration_min_s: 120           # shortest possible incident (2 min)
      duration_max_s: 900           # up to 15 min
      lane_capacity_fraction: 0.7   # 70 % of normal capacity remains
      response_time_s: 300          # emergency services arrive after 5 min
      secondary_risk_radius_m: 75   # secondary risk zone radius
      secondary_risk_multiplier: 1.5 # risk amplification inside that zone

    moderate:
      weight: 28                    # ~28 % of all accidents
      duration_min_s: 900           # at least 15 min
      duration_max_s: 2700          # up to 45 min
      lane_capacity_fraction: 0.4   # 40 % capacity — one lane typically blocked
      response_time_s: 600          # 10 min response time
      secondary_risk_radius_m: 150
      secondary_risk_multiplier: 2.5

    major:
      weight: 8                     # ~8 % of all accidents
      duration_min_s: 2700          # at least 45 min
      duration_max_s: 7200          # up to 2 h
      lane_capacity_fraction: 0.1   # near-total blockage
      response_time_s: 1200         # 20 min (police + tow truck needed)
      secondary_risk_radius_m: 300
      secondary_risk_multiplier: 4.0

    critical:
      weight: 2                     # ~2 % of all accidents (rare but severe)
      duration_min_s: 3600          # at least 1 h
      duration_max_s: 18000         # up to 5 h
      lane_capacity_fraction: 0.0   # full road closure
      response_time_s: 1800         # 30 min (multi-agency response)
      secondary_risk_radius_m: 500
      secondary_risk_multiplier: 6.0

# -----------------------------------------------------------------------------
output:
# -----------------------------------------------------------------------------

  # Root directory for all result folders.  Each run creates a timestamped
  # subfolder: results/Thessaloniki_Run1_2026-03-05_14:30/
  output_folder: results/seattle/

  # How often (in steps) to record a row in network_metrics.csv.
  # 60 steps × 5 s/step = every 5 minutes of simulated time.
  metrics_interval_steps: 60

  # Save per-vehicle speed/position snapshots alongside the metrics CSV.
  save_vehicle_snapshots: true

  # Write accident_reports.json with full lifecycle details for each accident.
  save_accident_reports: true

  # Compute and save the Antifragility Index (AI) to antifragility_index.json.
  compute_antifragility_index: true

  # Generate PNG visualisations and an HTML report in the output folder.
  # Requires: pip install . (pulls in matplotlib + seaborn).
  save_accident_heatmap: true

  # Seconds of metrics history captured immediately before each accident trigger.
  # Used for the before/after speed comparison plots and AI computation.
  pre_window_seconds: 300    # 5 min

  # Seconds of metrics history captured immediately after each accident resolves.
  post_window_seconds: 300   # 5 min

  # Number of simulation steps used as the "normal traffic" baseline when
  # computing the Antifragility Index.
  # Raised from 1800 → 3600: with period=1.0 the Thessaloniki network doesn't
  # reach steady-state vehicle count until ~step 2400; using only 1800 steps
  # captured the ramp-up phase (lower density, higher speeds), making the
  # post-accident comparison unfairly pessimistic.
  baseline_window_steps: 3600

# -----------------------------------------------------------------------------
resilience_assessment:
# -----------------------------------------------------------------------------
# Configuration for the one-click resilience assessment.
# Run with: python resilience_assessment.py
# See also: python resilience_assessment.py --help
# -----------------------------------------------------------------------------

  # Number of parallel SUMO instances.  null = auto (min(CPU_count - 1, 8)).
  # Each instance uses ~400 MB RAM for the Thessaloniki network.
  max_workers: null

  # Starting TCP port for TraCI connections.  Each worker gets a unique port
  # in the range [base_port, base_port + max_workers).
  base_port: 10000

  # Demand levels to test (randomTrips period values).
  # Lower period = more vehicles = higher demand.
  #   0.5 → ~1400–1600 veh  (heavily congested)
  #   1.0 → ~1100–1200 veh  (near-capacity)
  #   5.0 → ~150–200 veh    (very light, free-flow)
  demand_levels: [0.5, 0.75, 1.0, 1.5, 2.0, 3.0, 5.0]

  # Number of random seeds per scenario for statistical significance.
  seeds_per_scenario: 3

  # Base seed — seeds will be base_seed, base_seed+1, …, base_seed+n-1.
  base_seed: 42

  # Incident configurations to test.
  # Each overrides risk.base_probability for that scenario group.
  incident_configs:
    - name: baseline
      base_probability: 0.0           # no accidents (pure traffic dynamics)
    - name: low_incident
      base_probability: 5.0e-05       # low incident rate
    - name: default_incident
      base_probability: 1.5e-04       # moderate (calibrated default)
    - name: high_incident
      base_probability: 5.0e-04       # stress test
    - name: extreme_incident
      base_probability: 1.0e-03       # extreme overload

  # Resilience score component weights (must sum to 1.0).
  resilience_weights:
    speed: 0.30
    throughput: 0.25
    recovery: 0.25
    robustness: 0.20

  # Number of top weak points to identify and include in the report.
  top_weak_points: 10
