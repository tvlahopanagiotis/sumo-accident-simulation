# =============================================================================
# SAS – Docker Compose
# =============================================================================
# Services:
#   api      – FastAPI backend (port 8000)
#   frontend – React + nginx reverse proxy (port 80 → 8080 on host)
# =============================================================================

services:

  # ── Backend ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    volumes:
      # Persist simulation configs, data, and results outside the container
      - ./configs:/app/configs
      - ./data:/app/data
      - ./results:/app/results
      # Expose branding assets (writable by users)
      - ./frontend/public/branding:/app/frontend/public/branding
    ports:
      - "8000:8000"   # also directly accessible for debugging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "15555:80"      # http://localhost:15555
    depends_on:
      api:
        condition: service_healthy
